<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股 / A股 / 黄金 行情看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f1419;
    color: #e6e6e6;
    padding: 24px;
    min-height: 100vh;
  }
  .container { max-width: 1400px; margin: 0 auto; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px; padding-bottom: 16px;
    border-bottom: 1px solid #2a3441;
    flex-wrap: wrap; gap: 12px;
  }
  h1 { font-size: 22px; font-weight: 600; }
  h1 .accent { color: #f5a623; }
  .controls { display: flex; align-items: center; gap: 12px; }
  .updated { font-size: 12px; color: #8a96a3; }
  button {
    background: #1f6feb; color: #fff; border: 0; padding: 8px 16px;
    border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  button:hover { background: #388bfd; }
  button:disabled { background: #4a5568; cursor: not-allowed; }

  .section-title {
    font-size: 16px; font-weight: 600; margin: 24px 0 12px;
    padding-left: 12px; border-left: 3px solid #f5a623;
  }

  .index-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 12px;
  }
  .index-card {
    background: #1a2332; border: 1px solid #2a3441;
    border-radius: 8px; padding: 16px;
    cursor: pointer; transition: all 0.2s;
  }
  .index-card:hover { border-color: #1f6feb; transform: translateY(-2px); }
  .index-card.active { border-color: #f5a623; background: #1f2a3a; }
  .index-card .name { font-size: 13px; color: #8a96a3; margin-bottom: 8px; }
  .index-card .price { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
  .index-card .change { font-size: 13px; }
  .up { color: #f6465d; }
  .down { color: #2ebd85; }
  .flat { color: #8a96a3; }

  .chart-wrapper {
    background: #1a2332; border: 1px solid #2a3441;
    border-radius: 8px; padding: 16px; margin-top: 12px;
    height: 360px; position: relative;
  }
  .chart-loading {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    color: #8a96a3; font-size: 13px;
  }

  .ranking-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-top: 12px;
  }
  @media (max-width: 900px) { .ranking-grid { grid-template-columns: 1fr; } }
  .rank-card {
    background: #1a2332; border: 1px solid #2a3441;
    border-radius: 8px; padding: 16px;
  }
  .rank-card h3 {
    font-size: 14px; font-weight: 600; margin-bottom: 12px;
  }
  .rank-card h3 .badge {
    display: inline-block; padding: 2px 8px; margin-left: 8px;
    border-radius: 4px; font-size: 11px; font-weight: normal;
  }
  .badge-up { background: rgba(246,70,93,0.15); color: #f6465d; }
  .badge-down { background: rgba(46,189,133,0.15); color: #2ebd85; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 6px; text-align: right; }
  th:nth-child(1), td:nth-child(1),
  th:nth-child(2), td:nth-child(2) { text-align: left; }
  th { color: #8a96a3; font-weight: normal; border-bottom: 1px solid #2a3441; }
  tbody tr { border-bottom: 1px solid #222b38; }
  tbody tr:hover { background: rgba(31,111,235,0.08); }
  tbody tr:last-child { border: 0; }
  td.code { color: #8a96a3; font-family: SF Mono, Consolas, monospace; font-size: 12px; }
  .empty { text-align: center; color: #8a96a3; padding: 24px; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📈 美股 / A股 / 黄金 <span class="accent">行情看板</span></h1>
    <div class="controls">
      <span class="updated" id="updated">—</span>
      <button id="refreshBtn" onclick="loadAll()">刷新</button>
    </div>
  </header>

  <div class="section-title">大盘指数（点击切换走势图）</div>
  <div class="index-grid" id="indexGrid"></div>

  <div class="section-title" id="chartTitle">走势图</div>
  <div class="chart-wrapper">
    <canvas id="trendChart"></canvas>
    <div class="chart-loading" id="chartLoading">加载中…</div>
  </div>

  <div class="section-title">A股 涨跌幅 Top10（沪深京）</div>
  <div class="ranking-grid">
    <div class="rank-card">
      <h3>涨幅榜 <span class="badge badge-up">A股 TOP10</span></h3>
      <div id="aGainers"><div class="empty">加载中…</div></div>
    </div>
    <div class="rank-card">
      <h3>跌幅榜 <span class="badge badge-down">A股 TOP10</span></h3>
      <div id="aLosers"><div class="empty">加载中…</div></div>
    </div>
  </div>

  <div class="section-title">美股 涨跌幅 Top10（NYSE / NASDAQ / AMEX）</div>
  <div class="ranking-grid">
    <div class="rank-card">
      <h3>涨幅榜 <span class="badge badge-up">美股 TOP10</span></h3>
      <div id="uGainers"><div class="empty">加载中…</div></div>
    </div>
    <div class="rank-card">
      <h3>跌幅榜 <span class="badge badge-down">美股 TOP10</span></h3>
      <div id="uLosers"><div class="empty">加载中…</div></div>
    </div>
  </div>

  <p style="text-align:center;color:#5a6573;font-size:11px;margin-top:32px;">
    数据来源：腾讯财经 / 新浪财经 公开接口（仅供参考，不构成投资建议）
  </p>
</div>

<script>
/* ========== 工具函数 ========== */

// 拉 GBK 文本（腾讯 qt.gtimg.cn 走 GBK）
async function fetchGbk(url) {
  const res = await fetch(url, { mode: 'cors' });
  const buf = await res.arrayBuffer();
  return new TextDecoder('gbk').decode(buf);
}

// JSONP 工具（用于新浪美股榜）
let jsonpId = 0;
function jsonp(buildUrl, timeout = 10000) {
  return new Promise((resolve, reject) => {
    const cbName = 'jsonp_cb_' + (++jsonpId) + '_' + Date.now();
    const url = buildUrl(cbName);
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      cleanup(); reject(new Error('jsonp timeout: ' + url));
    }, timeout);
    function cleanup() {
      clearTimeout(timer);
      try { delete window[cbName]; } catch(e) { window[cbName] = undefined; }
      script.remove();
    }
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('jsonp error: ' + url)); };
    script.src = url;
    document.head.appendChild(script);
  });
}

/* ========== 指数定义 ==========
 * 腾讯股票代码：
 *   sh000001 上证, sz399001 深证成指, sz399006 创业板, sh000300 沪深300
 *   usDJI 道琼斯, usIXIC 纳斯达克综合, usINX 标普500
 */
const INDICES = [
  { code: 'sh000001', name: '上证指数',    market: 'A',  klineApi: 'cn' },
  { code: 'sz399001', name: '深证成指',    market: 'A',  klineApi: 'cn' },
  { code: 'sz399006', name: '创业板指',    market: 'A',  klineApi: 'cn' },
  { code: 'sh000300', name: '沪深300',     market: 'A',  klineApi: 'cn' },
  { code: 'sh518880', name: '黄金ETF',     market: 'CM', klineApi: 'cn' },
  { code: 'sz161226', name: '白银LOF',     market: 'CM', klineApi: 'cn' },
  { code: 'sz160416', name: '原油基金',    market: 'CM', klineApi: 'cn' },
  { code: 'usDJI',    name: '道琼斯',      market: 'US', klineApi: 'us' },
  { code: 'usIXIC',   name: '纳斯达克',    market: 'US', klineApi: 'us' },
  { code: 'usINX',    name: '标普500',     market: 'US', klineApi: 'us' },
];

/* ========== 拉取实时报价（腾讯，一次性多代码） ========== */
async function fetchAllQuotes() {
  const codes = INDICES.map(i => i.code).join(',');
  const url = `https://qt.gtimg.cn/q=${codes}&_=${Date.now()}`;
  const text = await fetchGbk(url);
  const lines = text.split(';').filter(l => l.trim());
  const map = {};
  lines.forEach(line => {
    const m = line.match(/v_([a-zA-Z0-9]+)="([^"]+)"/);
    if (!m) return;
    const code = m[1];
    const fields = m[2].split('~');
    // 字段索引（A股/美股通用，部分位置略有差异，但常用位置一致）
    // 3=最新价, 4=昨收, 5=今开, 31=涨跌额, 32=涨跌幅%, 33=最高, 34=最低
    map[code] = {
      price:    parseFloat(fields[3]),
      prev:     parseFloat(fields[4]),
      open:     parseFloat(fields[5]),
      change:   parseFloat(fields[31]),
      pct:      parseFloat(fields[32]),
      high:     parseFloat(fields[33]),
      low:      parseFloat(fields[34]),
    };
  });
  return map;
}

/* ========== 拉取 K 线 ========== */
async function fetchKline(idx, lmt = 60) {
  // A股/港股: appstock/app/fqkline/get
  // 美股: appstock/app/usfqkline/get
  const path = idx.klineApi === 'us' ? 'usfqkline/get' : 'fqkline/get';
  const url = `https://web.ifzq.gtimg.cn/appstock/app/${path}?_var=&param=${idx.code},day,,,${lmt},qfq&_=${Date.now()}`;
  const res = await fetch(url, { mode: 'cors' });
  const json = await res.json();
  if (!json || !json.data) throw new Error('no kline data');
  // 数据可能在 data[code].day 或 data[code].qfqday
  const d = json.data[idx.code] || {};
  const series = d.qfqday || d.day || [];
  return series.map(row => ({
    date: row[0],
    open: parseFloat(row[1]),
    close: parseFloat(row[2]),
    high: parseFloat(row[3]),
    low: parseFloat(row[4]),
  })).filter(k => !isNaN(k.close));
}

/* ========== 拉取涨跌幅榜 ========== */

// A股 — 新浪 vip API（CORS 开放）
async function fetchARanking(direction) {
  const sort = 'changepercent';
  const asc = direction === 'up' ? 0 : 1;
  const url = `https://vip.stock.finance.sina.com.cn/quotes_service/api/json_v2.php/Market_Center.getHQNodeData?page=1&num=10&sort=${sort}&asc=${asc}&node=hs_a&_=${Date.now()}`;
  const res = await fetch(url, { mode: 'cors' });
  const text = await res.text();
  // 偶尔返回前缀注释，先剥离
  const jsonText = text.replace(/^\/\*.*?\*\//, '').trim();
  const arr = JSON.parse(jsonText);
  return arr.map(r => ({
    code: r.symbol,
    name: r.name,
    price: parseFloat(r.trade),
    pct: parseFloat(r.changepercent),
    change: parseFloat(r.pricechange),
  }));
}

// 美股 — 新浪 JSONP
async function fetchUSRanking(direction) {
  const asc = direction === 'up' ? 0 : 1;
  const data = await jsonp((cb) =>
    `https://stock.finance.sina.com.cn/usstock/api/jsonp.php/${cb}/US_CategoryService.getList?page=1&num=10&sort=chg&asc=${asc}&market=&_=${Date.now()}`
  );
  if (!data || !data.data) return [];
  return data.data.slice(0, 10).map(r => ({
    code: r.symbol,
    name: r.cname && r.cname !== r.name ? r.cname : r.name,
    price: parseFloat(r.price),
    pct: parseFloat(r.chg),
    change: parseFloat(r.diff),
  }));
}

/* ========== 渲染 ========== */
let activeCode = 'sh000001';
let trendChart = null;

function fmt(n, digits = 2) {
  if (n === undefined || n === null || isNaN(n)) return '--';
  return n.toLocaleString('en-US', { minimumFractionDigits: digits, maximumFractionDigits: digits });
}

function renderIndices(quotes) {
  const grid = document.getElementById('indexGrid');
  grid.innerHTML = INDICES.map(idx => {
    const q = quotes[idx.code];
    if (!q || isNaN(q.price)) {
      return `<div class="index-card" data-code="${idx.code}" data-name="${idx.name}">
        <div class="name">${idx.name} (${idx.market === 'US' ? '美股' : idx.market === 'CM' ? '商品' : 'A股'})</div>
        <div class="price flat">--</div>
        <div class="change flat">数据获取失败</div>
      </div>`;
    }
    const cls = q.pct > 0 ? 'up' : (q.pct < 0 ? 'down' : 'flat');
    const sign = q.pct > 0 ? '+' : '';
    return `<div class="index-card ${idx.code === activeCode ? 'active' : ''}" data-code="${idx.code}" data-name="${idx.name}">
      <div class="name">${idx.name} <span style="opacity:.5">(${idx.market === 'US' ? '美股' : idx.market === 'CM' ? '商品' : 'A股'})</span></div>
      <div class="price ${cls}">${fmt(q.price)}</div>
      <div class="change ${cls}">${sign}${fmt(q.change)}　${sign}${fmt(q.pct)}%</div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.index-card').forEach(card => {
    card.addEventListener('click', () => {
      const code = card.dataset.code;
      const name = card.dataset.name;
      const idx = INDICES.find(i => i.code === code);
      if (!idx) return;
      activeCode = code;
      grid.querySelectorAll('.index-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      loadChart(idx);
    });
  });
}

async function loadChart(idx) {
  const loading = document.getElementById('chartLoading');
  document.getElementById('chartTitle').textContent = `走势图 — ${idx.name}（最近60日）`;
  loading.textContent = '加载中…';
  loading.style.display = 'flex';
  try {
    const klines = await fetchKline(idx, 60);
    if (klines.length === 0) throw new Error('暂无K线数据');
    const labels = klines.map(k => k.date.slice(5));
    const closes = klines.map(k => k.close);
    const ctx = document.getElementById('trendChart').getContext('2d');
    if (trendChart) trendChart.destroy();
    const startPrice = closes[0];
    const endPrice = closes[closes.length - 1];
    const lineColor = endPrice >= startPrice ? '#f6465d' : '#2ebd85';
    trendChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: idx.name,
          data: closes,
          borderColor: lineColor,
          backgroundColor: lineColor + '22',
          borderWidth: 2,
          fill: true,
          tension: 0.15,
          pointRadius: 0,
          pointHoverRadius: 5,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a2332',
            borderColor: '#2a3441',
            borderWidth: 1,
            titleColor: '#e6e6e6',
            bodyColor: '#e6e6e6',
            callbacks: { label: (ctx) => `收盘: ${fmt(ctx.parsed.y)}` }
          }
        },
        scales: {
          x: { ticks: { color: '#8a96a3', maxTicksLimit: 10 }, grid: { color: '#222b38' } },
          y: { ticks: { color: '#8a96a3' }, grid: { color: '#222b38' } }
        }
      }
    });
    loading.style.display = 'none';
  } catch (e) {
    loading.textContent = '走势图加载失败：' + e.message;
  }
}

function renderRanking(targetId, list, market) {
  const target = document.getElementById(targetId);
  if (!list || list.length === 0) {
    target.innerHTML = '<div class="empty">暂无数据（可能在非交易时段或网络受限）</div>';
    return;
  }
  const priceLabel = market === 'A' ? '现价(¥)' : '现价($)';
  target.innerHTML = `
    <table>
      <thead>
        <tr><th>代码</th><th>名称</th><th>${priceLabel}</th><th>涨跌幅</th><th>涨跌额</th></tr>
      </thead>
      <tbody>
        ${list.map(r => {
          const cls = r.pct > 0 ? 'up' : (r.pct < 0 ? 'down' : 'flat');
          const sign = r.pct > 0 ? '+' : '';
          return `<tr>
            <td class="code">${r.code}</td>
            <td>${r.name}</td>
            <td class="${cls}">${fmt(r.price)}</td>
            <td class="${cls}">${sign}${fmt(r.pct)}%</td>
            <td class="${cls}">${sign}${fmt(r.change)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

/* ========== 主流程 ========== */
async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '加载中…';

  try {
    const quotes = await fetchAllQuotes().catch(e => { console.warn('quotes fail', e); return {}; });
    renderIndices(quotes);

    const activeIdx = INDICES.find(i => i.code === activeCode) || INDICES[0];
    loadChart(activeIdx);

    const [aUp, aDown, uUp, uDown] = await Promise.all([
      fetchARanking('up').catch(e => { console.warn('aUp fail', e); return []; }),
      fetchARanking('down').catch(e => { console.warn('aDown fail', e); return []; }),
      fetchUSRanking('up').catch(e => { console.warn('uUp fail', e); return []; }),
      fetchUSRanking('down').catch(e => { console.warn('uDown fail', e); return []; }),
    ]);
    renderRanking('aGainers', aUp, 'A');
    renderRanking('aLosers',  aDown, 'A');
    renderRanking('uGainers', uUp, 'US');
    renderRanking('uLosers',  uDown, 'US');
  } finally {
    document.getElementById('updated').textContent = '更新于 ' + new Date().toLocaleString('zh-CN');
    btn.disabled = false;
    btn.textContent = '刷新';
  }
}

loadAll();
setInterval(loadAll, 60000);  // 每分钟自动刷新
</script>
</body>
</html>
